<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Mural Prototype</title>
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- MindAR for A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    /* Optional UI overlay */
    #ui-overlay {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 1000;
      font-family: sans-serif;
      pointer-events: none;
    }

    .instruction {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 20px;
    }

    #record-btn {
      width: 70px;
      height: 70px;
      background: white;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      cursor: pointer;
      display: block;
      margin: 0 auto;
      pointer-events: auto;
      transition: all 0.3s ease;
      position: relative;
    }

    #record-btn::after {
      content: '';
      width: 30px;
      height: 30px;
      background: #ff4444;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.3s ease;
    }

    #record-btn.recording {
      border-color: #ff4444;
      animation: pulse 1.5s infinite;
    }

    #record-btn.recording::after {
      border-radius: 4px;
      width: 25px;
      height: 25px;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
    }
  </style>
</head>

<body>
  <div id="ui-overlay">
    <div class="instruction">Point your camera at the mural image</div>
    <button id="record-btn" aria-label="Record AR Experience"></button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: /targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 25; warmupTolerance: 10; uiLoading: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights, preserveDrawingBuffer: true, antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets>
      <video id="blob-video" src="/assets/Blob.webm" preload="auto" loop="true" muted="true" playsinline
        webkit-playsinline></video>
      <!-- Replace this URL with your local ./assets/skateboard.glb once you have it -->
      <a-asset-item id="skateboardModel" src="/assets/Skateboard.glb"></a-asset-item>
      <img id="board-art" src="/assets/Board Art.png">
      <img id="skatepark-d" src="/assets/skate parkd.jpg">
      <img id="skatepark-e" src="/assets/skate parke.jpg">
      <img id="skatepark-f" src="/assets/skate park f.jpg">
      <img id="allience-mother" src="/assets/Allience design_Mother.png">
      <img id="allience-logs" src="/assets/Allience design_Logs.png">
      <video id="allience-barrel-video" src="/assets/Barrel.mov" preload="auto" autoplay loop="true" muted="true" playsinline webkit-playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Entity bound to the target image (targetIndex: 0) -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- ============================================== -->
      <!-- Background Video (Blob)                        -->
      <!-- ============================================== -->
      <a-video id="video-entity" src="#blob-video" position="0 0 0.01" width="1.413927" height="0.545918"
        material="transparent: true; alphaTest: 0.5;">
      </a-video>

      <!-- ============================================== -->
      <!-- 2D Element (Custom Skater Girl Image)          -->
      <!-- ============================================== -->
      <a-image id="ui-plane" src="/assets/Skater Girl.png" position="0 0 0.02" width="1.413927" height="0.545918"
        transparent="true">
      </a-image>


      <!-- ============================================== -->
      <!-- 3D Element (GLTF Model)                        -->
      <!-- ============================================== -->
      <a-gltf-model id="hero-box" src="#skateboardModel" position="0 0 0.03" scale="0.546 0.546 0.546" rotation="0 0 0">
      </a-gltf-model>

      <!-- Lighting for 3D elements -->
      <a-light type="ambient" color="#FFF" intensity="1"></a-light>
      <a-light type="directional" color="#FFF" intensity="2.5" position="-1 2 2"></a-light>

    </a-entity>

    <!-- ============================================== -->
    <!-- ARTWORK 2: Skate Park Slideshow (targetIndex: 1) -->
    <!-- ============================================== -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-image id="slideshow-plane"
               src="#skatepark-d"
               position="0 0 0.01"
               width="1.413927" height="0.545918"
               transparent="true">
      </a-image>

      <a-light type="ambient" color="#FFF" intensity="1"></a-light>
    </a-entity>

    <!-- ============================================== -->
    <!-- ARTWORK 3: Allience Design Stacked (targetIndex: 2) -->
    <!-- ============================================== -->
    <a-entity mindar-image-target="targetIndex: 2">
      <a-image id="allience-logs-plane" src="#allience-logs" position="0 0 0.01" width="1.413927" height="1" transparent="true"></a-image>
      <a-video id="allience-barrel-plane" src="#allience-barrel-video" position="0 0 0.02" width="1.413927" height="1" material="transparent: true; shader: flat;"></a-video>
      <a-image id="allience-mother-plane" src="#allience-mother" position="0 0 0.03" width="1.413927" height="1" transparent="true"></a-image>
      <a-light type="ambient" color="#FFF" intensity="1"></a-light>
    </a-entity>
  </a-scene>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
