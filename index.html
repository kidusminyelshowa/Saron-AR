<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Interactive WebAR Mural Experience — point your camera at the artwork to reveal augmented reality content.">
  <title>AR Mural Experience</title>
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- MindAR for A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Loading Screen ── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #loading-screen .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #loading-screen p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 0.05em;
      margin: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── UI Overlay ── */
    #ui-overlay {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 1000;
      pointer-events: none;
    }

    .instruction {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 20px;
      font-size: 14px;
      transition: opacity 0.4s ease;
    }

    .instruction.hidden {
      opacity: 0;
    }

    #record-btn {
      width: 70px;
      height: 70px;
      background: white;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      cursor: pointer;
      display: block;
      margin: 0 auto;
      pointer-events: auto;
      transition: all 0.3s ease;
      position: relative;
    }

    #record-btn::after {
      content: '';
      width: 30px;
      height: 30px;
      background: #ff4444;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.3s ease;
    }

    #record-btn.recording {
      border-color: #ff4444;
      animation: pulse 1.5s infinite;
    }

    #record-btn.recording::after {
      border-radius: 4px;
      width: 25px;
      height: 25px;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
    }
  </style>
</head>

<body>
  <!-- Loading screen shown while heavy assets download -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Loading AR experience…</p>
  </div>

  <div id="ui-overlay">
    <div id="instruction-text" class="instruction">Point your camera at the mural</div>
    <button id="record-btn" aria-label="Record AR Experience"></button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: /targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 25; warmupTolerance: 10; uiLoading: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights, antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets timeout="60000">
      <video id="blob-video" src="/assets/Blob.webm" preload="auto" loop="true" muted="true" playsinline
        webkit-playsinline crossorigin="anonymous"></video>
      <a-asset-item id="skateboardModel" src="/assets/Skateboard.glb"></a-asset-item>
      <img id="board-art" src="/assets/Board Art.png" crossorigin="anonymous">
      <img id="skatepark-d" src="/assets/skate parkd.jpg" crossorigin="anonymous">
      <img id="skatepark-e" src="/assets/skate parke.jpg" crossorigin="anonymous">
      <img id="skatepark-f" src="/assets/skate park f.jpg" crossorigin="anonymous">
      <img id="allience-mother" src="/assets/Allience design_Mother.png" crossorigin="anonymous">
      <img id="allience-logs" src="/assets/Allience design_Logs.png" crossorigin="anonymous">
      <video id="allience-barrel-video" preload="auto" loop="true" muted="true" playsinline webkit-playsinline crossorigin="anonymous">
        <source src="/assets/Allience design_Barrel.webm" type="video/webm">
        <source src="/assets/Barrel.mov" type="video/quicktime">
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ============================================== -->
    <!-- ARTWORK 1: Skateboard (targetIndex: 0)         -->
    <!-- ============================================== -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-video id="video-entity" src="#blob-video" position="0 0 0.01" width="1.413927" height="0.545918"
        material="transparent: true; alphaTest: 0.5;"></a-video>

      <a-image id="ui-plane" src="/assets/Skater Girl.png" position="0 0 0.02" width="1.413927" height="0.545918"
        transparent="true"></a-image>

      <a-gltf-model id="hero-box" src="#skateboardModel" position="0 0 0.03" scale="0.546 0.546 0.546" rotation="0 0 0">
      </a-gltf-model>

      <!-- Lighting for 3D elements -->
      <a-light type="ambient" color="#FFF" intensity="1"></a-light>
      <a-light type="directional" color="#FFF" intensity="2.5" position="-1 2 2"></a-light>
    </a-entity>

    <!-- ============================================== -->
    <!-- ARTWORK 2: Skate Park Slideshow (targetIndex: 1) -->
    <!-- ============================================== -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-image id="slideshow-plane"
               src="#skatepark-d"
               position="0 0 0.01"
               width="1.413927" height="0.545918"
               transparent="true">
      </a-image>

      <a-light type="ambient" color="#FFF" intensity="1"></a-light>
    </a-entity>

    <!-- ============================================== -->
    <!-- ARTWORK 3: Allience Design Stacked (targetIndex: 2) -->
    <!-- ============================================== -->
    <a-entity mindar-image-target="targetIndex: 2">
      <a-image id="allience-logs-plane" src="#allience-logs" position="0 0 0.01" width="1.413927" height="1" transparent="true"></a-image>
      <a-video id="allience-barrel-plane" src="#allience-barrel-video" position="0 0 0.02" width="1.413927" height="1" transparent="true" material="transparent: true; alphaTest: 0.5;"></a-video>
      <a-image id="allience-mother-plane" src="#allience-mother" position="0 0 0.03" width="1.413927" height="1" transparent="true"></a-image>
      <a-light type="ambient" color="#FFF" intensity="1"></a-light>
    </a-entity>
  </a-scene>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
